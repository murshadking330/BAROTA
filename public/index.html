<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Best Landing Page – Fast & Professional</title>
  <meta name="description" content="High converting landing page with SEO, preview image and fast loading.">

  <!-- Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph (WhatsApp / Facebook Preview) -->
  <meta property="og:title" content="Best Landing Page 🔥">
  <meta property="og:description" content="Professional landing page with fast loading & SEO.">
  <meta property="og:image" content="https://your-site.vercel.app/preview.jpg">
  <meta property="og:url" content="https://your-site.vercel.app">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2);
      color: white;
      text-align: center;
    }
    .box {
      max-width: 420px;
      margin: 80px auto;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    button {
      background: #00ffcc;
      border: none;
      padding: 14px 25px;
      font-size: 18px;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background: #00e6b8;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🚀 Welcome</h1>
    <p>This is a high converting landing page.</p>

    <button onclick="redirect()">Get Started</button>
  </div>

  <script>
    function redirect() {
      document.body.innerHTML = "<h2>⏳ Please wait...</h2>";
      setTimeout(() => {
        window.location.href = "https://google.com";
      }, 2000);
    }
  </script>
</body>
</html>
