<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#000;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.video-box{
  width:100%;
  max-width:420px;
  height:100vh;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay{
  position:absolute;
  bottom:30px;
  width:100%;
  text-align:center;
}
button{
  background:#00ffd5;
  border:none;
  padding:14px 28px;
  font-size:18px;
  border-radius:30px;
}
</style>
</head>

<body>
<div class="video-box">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.videy.co/tV0dY8al1.mp4" type="video/mp4">
  </video>
  <div class="overlay">
    <button onclick="go()">Continue</button>
  </div>
</div>

<script>
function go(){
  window.location.href="https://google.com"; // FINAL LINK
}
</script>
</body>
</html>
