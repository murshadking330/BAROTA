<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* Full screen wrapper */
.wrapper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 9:16 TikTok frame */
.frame {
  position: relative;
  height: 100vh;
  aspect-ratio: 9 / 16;
  max-width: 100vw;
  background: black;
}

/* Video */
.frame video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 🔥 THIS IS KEY */
}

/* Button overlay */
.overlay {
  position: absolute;
  bottom: 40px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.overlay button {
  background: #00ffd5;
  border: none;
  padding: 14px 32px;
  font-size: 18px;
  border-radius: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="frame">
    <video autoplay muted loop playsinline>
      <source src="https://cdn.videy.co/ejqCiJIy1.mp4" type="video/mp4">
    </video>

    <div class="overlay">
      <button onclick="go()">Continue</button>
    </div>
  </div>
</div>

<script>
function go(){
  window.location.href = "https://riftformula.com/ai/22801024/index.php"; // FINAL LINK
}
</script>

</body>
</html>
